<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paramount Command Centre V3</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
</head>
<body>
  <aside class="sidebar">
    <div class="brand-block">
      <div class="fan-mark">P</div>
      <div>
        <div class="brand-name">Paramount</div>
        <div class="brand-subtitle">Command Centre V3</div>
      </div>
    </div>
    <nav class="side-nav">
      <button class="side-link active" data-module="home">Home</button>
      <button class="side-link" data-module="reporting">Reporting Intelligence</button>
      <button class="side-link" data-module="contracts">Maintenance Contracts</button>
      <button class="side-link" data-module="employee">Employee Portal</button>
      <button class="side-link" data-module="settings">Settings</button>
    </nav>
    <div class="side-note">Comfort Engineered<br>Commercial · Industrial · Data Centres</div>
  </aside>

  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Australian HVAC Enterprise Operations Platform</p>
        <h1 id="page-title">Paramount Command Centre</h1>
      </div>
      <div class="top-pills">
        <span class="pill accent">Company Health 94/100</span>
        <span class="pill">Supabase ready</span>
      </div>
    </header>

    <section id="module-tabs" class="tabs"></section>
    <section id="screen" class="screen"></section>
  </main>

  <div id="drawer" class="drawer hidden">
    <div class="drawer-card">
      <button class="drawer-close" id="close-drawer">×</button>
      <div id="drawer-content"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
