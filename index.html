<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Paramount Command Centre V3</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--orange:#E87722;--navy:#0E2A47;--steel:#2C5F7C;--sand:#EFE9DD;--light:#F4F4F4;--grey:#6B6F73;--ink:#132333;--white:#fff;--ok:#2f855a;--warn:#b7791f;--bad:#c53030;--glass:rgba(255,255,255,.82);--shadow:0 18px 50px rgba(14,42,71,.12);--radius:24px}*{box-sizing:border-box}body{margin:0;font-family:Calibri,Arial,sans-serif;background:linear-gradient(135deg,var(--sand),#fff 50%,#e8eef2);color:var(--ink)}h1,h2,h3{font-family:Georgia,serif;font-weight:400;margin:0}button,input,select,textarea{font-family:inherit}.app{display:grid;grid-template-columns:282px 1fr;min-height:100vh}.side{background:var(--navy);color:#fff;padding:28px 18px;position:sticky;top:0;height:100vh;box-shadow:8px 0 30px rgba(0,0,0,.18)}.brand{display:flex;gap:14px;align-items:center;margin-bottom:34px}.logo{width:52px;height:52px;border-radius:18px;background:var(--sand);color:var(--navy);display:grid;place-items:center;font:bold 28px Georgia}.brand b{display:block;font-size:18px}.brand small{color:#c9d4df}.nav button{display:block;width:100%;border:0;background:transparent;color:#d9e4ee;text-align:left;padding:15px 16px;border-radius:16px;font-weight:700;font-size:16px;margin:8px 0;cursor:pointer}.nav button.active,.nav button:hover{background:rgba(239,233,221,.13);color:#fff}.sidefoot{position:absolute;bottom:28px;color:#b9c6d3;font-size:13px;line-height:1.5}.main{padding:28px 30px 60px;overflow:hidden}.hero{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:24px}.eyebrow{letter-spacing:.18em;color:var(--steel);font-weight:900;font-size:12px}.hero h1{font-size:44px;color:var(--navy);margin-top:8px}.pill{border:1px solid rgba(14,42,71,.15);border-radius:999px;padding:12px 16px;background:rgba(255,255,255,.7);font-weight:800;color:var(--navy);box-shadow:var(--shadow);white-space:nowrap}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 22px}.tabs button,.btn{border:0;border-radius:16px;background:#fff;color:var(--navy);font-weight:800;padding:11px 15px;box-shadow:0 8px 20px rgba(14,42,71,.08);cursor:pointer}.tabs button.active,.btn.primary{background:var(--navy);color:#fff}.btn.orange{background:var(--orange);color:#fff}.grid{display:grid;gap:18px}.cards3{grid-template-columns:repeat(3,minmax(220px,1fr))}.cards4{grid-template-columns:repeat(4,minmax(160px,1fr))}.cards2{grid-template-columns:repeat(2,minmax(280px,1fr))}.card{background:var(--glass);border:1px solid rgba(14,42,71,.08);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);backdrop-filter:blur(12px)}.card.click{cursor:pointer;transition:.2s}.card.click:hover{transform:translateY(-4px);border-color:rgba(232,119,34,.35)}.module-card{min-height:210px;display:flex;flex-direction:column;justify-content:space-between}.module-card h2{font-size:30px;color:var(--navy)}.module-card p{font-size:16px;line-height:1.45;color:#526172}.iconbox{width:58px;height:58px;border-radius:18px;background:var(--navy);color:var(--sand);display:grid;place-items:center;font-size:24px}.kpi small{display:block;color:var(--grey);font-weight:800;text-transform:uppercase;font-size:11px;letter-spacing:.06em}.kpi strong{display:block;font-size:30px;color:var(--navy);margin:8px 0 5px}.kpi span{font-weight:800;color:var(--ok)}.toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:18px}.toolbar select,.toolbar input{border:1px solid rgba(14,42,71,.15);border-radius:14px;padding:12px;background:#fff;color:var(--navy);font-weight:700}.chartbox{height:310px}.table{width:100%;border-collapse:collapse;font-size:14px}.table th{text-align:left;color:var(--grey);font-size:12px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #dfe4e8;padding:12px}.table td{border-bottom:1px solid #e9edf0;padding:13px}.badge{display:inline-block;border-radius:999px;padding:5px 10px;font-weight:900;font-size:12px;background:#e8edf1;color:var(--navy)}.badge.ok{background:#ddefe4;color:var(--ok)}.badge.warn{background:#fff1d6;color:var(--warn)}.badge.bad{background:#fae0e0;color:var(--bad)}.panel-title{display:flex;justify-content:space-between;gap:12px;margin-bottom:16px;align-items:center}.panel-title h2{color:var(--navy);font-size:26px}.insight{border-left:5px solid var(--orange);background:#fff;padding:16px;border-radius:16px;line-height:1.45}.formgrid{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:12px}.field label{display:block;font-weight:800;color:var(--navy);margin-bottom:6px}.field input,.field select,.field textarea{width:100%;border:1px solid #d6dfe7;border-radius:14px;padding:12px;background:#fff}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{min-height:92px;background:#fff;border-radius:16px;padding:9px;border:1px solid #e3e9ef}.day b{display:block;color:var(--navy);margin-bottom:6px}.leave{font-size:12px;border-radius:8px;padding:4px 6px;margin:3px 0;background:var(--sand)}.leave.sick{background:#e4edf3}.leave.long{background:#f9e4d1}.leave.pub{background:#fff0b5}.progress{height:12px;background:#e5ebef;border-radius:99px;overflow:hidden}.progress i{display:block;height:100%;background:var(--orange)}.modal{position:fixed;inset:0;background:rgba(14,42,71,.58);display:none;align-items:center;justify-content:center;padding:20px;z-index:20}.modal.show{display:flex}.modalbox{max-width:980px;width:100%;max-height:86vh;overflow:auto;background:#fff;border-radius:26px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.28)}.close{float:right;background:var(--navy);color:#fff;border:0;border-radius:12px;padding:8px 12px;cursor:pointer}.hidden{display:none!important}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.sidefoot{display:none}.main{padding:22px}.cards3,.cards4,.cards2,.formgrid{grid-template-columns:1fr}.hero{display:block}.hero h1{font-size:34px}.calendar{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body><div class="app"><aside class="side"><div class="brand"><div class="logo">P</div><div><b>Paramount</b><small>Command Centre V3</small></div></div><nav class="nav" id="mainNav"></nav><div class="sidefoot">Comfort Engineered<br/>Supabase + Simpro ready</div></aside><main class="main"><div class="hero"><div><div class="eyebrow">AUSTRALIAN HVAC ENTERPRISE PLATFORM</div><h1 id="pageTitle">Paramount Command Centre</h1></div><div class="pill" id="healthPill">Company Health 94/100</div></div><div id="content"></div></main></div><div class="modal" id="modal"><div class="modalbox"><button class="close" onclick="closeModal()">Close</button><div id="modalContent"></div></div></div>
<script>
const orange='#E87722', navy='#0E2A47', steel='#2C5F7C', sand='#EFE9DD', grey='#6B6F73';
Chart.defaults.font.family='Calibri, Arial'; Chart.defaults.font.size=14; Chart.defaults.color=navy;
const techs=['Chris Dawson','Mick Fraser','Ali Khan','Ben Roberts','Sophie Tran','Jack Wilson','Daniel Price','Liam O\'Brien'];
const sites=['Monash Health Clayton','Chadstone Corporate Tower','Melbourne Data Exchange','Mulgrave Business Park','Rialto Plant Room','Dandenong Logistics Hub','Bayside Private Hospital','Alexandria Tech Campus','Docklands Retail Centre','Moorabbin Manufacturing'];
const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const state={module:'Home', tab:'Executive Overview', period:'Monthly', selectedTech:techs[0], assetRows:[['AHU','AHU-01','Daikin','Level 3 Plantroom','Quarterly',4],['Split System','AC-2.04','Mitsubishi','Boardroom','Biannual',2],['Exhaust Fan','EF-07','Fantech','Amenities','Annual',1]]};
const nav=['Home','Reporting Intelligence','Maintenance Contracts','Employee Portal','Settings'];
const reportTabs=['Executive Overview','Quote Activity','Technician Activity','Job Report','Technician Labour','Labour Forecast','Financial KPIs','Margins','Win/Loss Reasons'];
const contractTabs=['Dashboard','Contracts','Customers','Proposal Generator','Upcoming Renewals','Expiring Contracts','Settings'];
const leaveTabs=['Dashboard','Calendar','Annual Leave','Sick Leave','Apply For Leave','Settings'];
function money(n){return '$'+Math.round(n).toLocaleString('en-AU')} function pct(n){return Math.round(n)+'%'}
function seed(i,base=50){return Math.round(base+Math.sin(i*1.7)*base*.28+(i%7)*3)}
function renderNav(){mainNav.innerHTML=nav.map(n=>`<button class="${state.module==n?'active':''}" onclick="go('${n}')">${n}</button>`).join('')}
function go(m){state.module=m; state.tab=m=='Reporting Intelligence'?'Executive Overview':m=='Maintenance Contracts'?'Dashboard':m=='Employee Portal'?'Dashboard':''; render()}
function render(){renderNav(); pageTitle.textContent=state.module=='Home'?'Paramount Command Centre':state.module; healthPill.textContent='Company Health 94/100'; if(state.module=='Home')home(); if(state.module=='Reporting Intelligence')reporting(); if(state.module=='Maintenance Contracts')contracts(); if(state.module=='Employee Portal')employee(); if(state.module=='Settings')settings();}
function tabs(list){return `<div class="tabs">${list.map(t=>`<button class="${state.tab==t?'active':''}" onclick="state.tab='${t}';render()">${t}</button>`).join('')}</div>`}
function periodBar(){return `<div class="toolbar"><div><select onchange="state.period=this.value;render()"><option>Weekly</option><option ${state.period=='Monthly'?'selected':''}>Monthly</option><option>4 Weekly</option><option>Calendar Month</option><option>Seasonal</option><option>Yearly</option></select></div><button class="btn" onclick="openModal('Period Drill Down','${state.period} detail opened. This screen shows technician quote generation, jobs attended, quote value, approved value, outstanding value and conversion for the selected period.')">Open selected ${state.period}</button></div>`}
function home(){content.innerHTML=`<div class="grid cards3"><div class="card module-card click" onclick="go('Reporting Intelligence')"><div class="iconbox">📈</div><div><h2>Reporting Intelligence</h2><p>Five years of HVAC reporting, quote activity, technician activity, labour forecasting and management actions in one decision centre.</p></div></div><div class="card module-card click" onclick="go('Maintenance Contracts')"><div class="iconbox">📄</div><div><h2>Maintenance Contracts</h2><p>Manage contracts, customers, assets, renewals and premium proposal generation with upload, CSV export and automatic pricing rules.</p></div></div><div class="card module-card click" onclick="go('Employee Portal')"><div class="iconbox">👥</div><div><h2>Employee Portal</h2><p>Calendar-based leave management, annual leave balances, sick leave tracking, birthdays, public holidays and staff requests.</p></div></div></div><br><div class="grid cards4">${kpis([['Revenue MTD','$842k','+12%'],['Outstanding Quotes','$417k','Needs chase'],['Labour Balance','232 hrs','Healthy'],['Staff Away','3','Today']])}</div><br><div class="grid cards2"><div class="card"><div class="panel-title"><h2>Morning Snapshot</h2><span class="badge ok">Live demo</span></div><p class="insight">Quote activity is above target, but 18 high-value customer sites have outstanding approvals older than 21 days. Labour balance is healthy at +232 hours.</p></div><div class="card"><div class="panel-title"><h2>Management Actions</h2></div><table class="table"><tr><td>Chase Monash Health approvals</td><td><span class="badge warn">$78k</span></td></tr><tr><td>Review Priority 1 unscheduled jobs</td><td><span class="badge bad">4</span></td></tr><tr><td>Balance Sophie and Jack's quote workload</td><td><span class="badge">KPI gap</span></td></tr></table></div></div>`}
function kpis(arr){return arr.map(x=>`<div class="card kpi click" onclick="openModal('${x[0]}','Detailed view for ${x[0]} with trend, owner, source data, recommended action and history.')"><small>${x[0]}</small><strong>${x[1]}</strong><span>${x[2]}</span></div>`).join('')}
function reporting(){content.innerHTML=tabs(reportTabs)+periodBar()+`<div id="reportBody"></div>`; const b=document.getElementById('reportBody'); if(state.tab=='Executive Overview')exec(b); if(state.tab=='Quote Activity')quotes(b); if(state.tab=='Technician Activity')tech(b); if(state.tab=='Job Report')jobs(b); if(state.tab=='Technician Labour')labour(b); if(state.tab=='Labour Forecast')forecast(b); if(['Financial KPIs','Margins','Win/Loss Reasons'].includes(state.tab))genericReport(b)}
function exec(b){b.innerHTML=`<div class="grid cards4">${kpis([['Company Health','94/100','Excellent'],['Revenue','$4.8m','+12%'],['Quote Conversion','68%','+8%'],['Utilisation','91%','On target']])}</div><br><div class="grid cards2"><div class="card"><div class="panel-title"><h2>Five Year Revenue Trend</h2></div><div class="chartbox"><canvas id="c1"></canvas></div></div><div class="card"><div class="panel-title"><h2>Decision Summary</h2></div><p class="insight">The company is healthy. Quote conversion and maintenance revenue are leading indicators. The biggest management opportunity is outstanding quotes at customer sites with recurring service calls.</p><table class="table"><tr><th>Area</th><th>Status</th><th>Action</th></tr><tr><td>Labour</td><td><span class="badge ok">Healthy</span></td><td>Hold hours steady</td></tr><tr><td>Quotes</td><td><span class="badge warn">Watch</span></td><td>Chase approvals</td></tr><tr><td>Callbacks</td><td><span class="badge ok">Low</span></td><td>Maintain QA</td></tr></table></div></div>`; line('c1',months,[620,710,690,760,820,842,880,910,940,975,1010,1060],'Revenue',orange)}
function quotes(b){let rows=sites.map((s,i)=>`<tr onclick="openModal('${s}','Customer drill-down: outstanding quote value ${money(18000+i*7900)}, approved value ${money(32000+i*8400)}, conversion ${pct(52+i%5*6)}. Shows all historical quote activity and jobs attended.')"><td>${s}</td><td>${12+i}</td><td>${money(18000+i*7900)}</td><td>${money(32000+i*8400)}</td><td>${pct(52+i%5*6)}</td><td><span class="badge ${i<3?'warn':'ok'}">${i<3?'Chase':'Healthy'}</span></td></tr>`).join(''); b.innerHTML=`<div class="grid cards4">${kpis([['Quotes Generated','1,284','All techs'],['Quote Value','$2.9m','5 yr trend'],['Approved Value','$1.98m','68%'],['Jobs Attended','1,311','KPI 1:1']])}</div><br><div class="grid cards2"><div class="card"><div class="panel-title"><h2>Company Quote Activity</h2><span class="badge">${state.period}</span></div><div class="chartbox"><canvas id="cq"></canvas></div></div><div class="card"><div class="panel-title"><h2>Approved vs Outstanding</h2></div><div class="chartbox"><canvas id="qa"></canvas></div></div></div><br><div class="card"><div class="panel-title"><h2>Customer Sites Ranked by Outstanding vs Approved Quotes</h2><button class="btn" onclick="openModal('Selected Period Drill Down','All technicians for ${state.period}: quotes generated, jobs attended, ratio, quote value, approved and outstanding value.')">Drill into ${state.period}</button></div><table class="table"><tr><th>Customer Site</th><th>Quotes</th><th>Outstanding $</th><th>Approved $</th><th>Conversion</th><th>Action</th></tr>${rows}</table></div>`; bar('cq',months,months.map((_,i)=>seed(i,80)),'Quotes Generated',steel); stack('qa')}
function tech(b){let opts=techs.map(t=>`<option ${state.selectedTech==t?'selected':''}>${t}</option>`).join(''); b.innerHTML=`<div class="toolbar"><select onchange="state.selectedTech=this.value;render()">${opts}</select><button class="btn primary" onclick="openModal('${state.selectedTech} Full History','Complete performance history opened: jobs, maintenance, service calls, quotes, values, ratios, peer ranking and KPI trend.')">Open full history</button></div><div class="grid cards4">${kpis([['Jobs Attended','41','This month'],['Quotes Written','32','Target 41'],['Quote/Job Ratio','0.78','Needs support'],['Maintenance Hours','126','On track']])}</div><br><div class="grid cards2"><div class="card"><div class="panel-title"><h2>${state.selectedTech}: Jobs vs Quotes</h2><span class="badge warn">KPI 1:1</span></div><div class="chartbox"><canvas id="tj"></canvas></div></div><div class="card"><div class="panel-title"><h2>Peer Benchmark</h2></div><div class="chartbox"><canvas id="peer"></canvas></div></div></div><br><div class="card"><div class="panel-title"><h2>Technician Activity Decision Summary</h2></div><p class="insight">${state.selectedTech} attended 41 jobs and wrote 32 quotes. Company KPI is 1 quote per 1 job, leaving a 9 quote opportunity gap. Peer benchmark shows they are below the best performer but close to company average.</p><table class="table"><tr><th>Technician</th><th>Jobs</th><th>Quotes</th><th>Ratio</th><th>Rank</th></tr>${techs.map((t,i)=>`<tr onclick="state.selectedTech='${t}';render()"><td>${t}</td><td>${35+i*3}</td><td>${29+i*2}</td><td>${((29+i*2)/(35+i*3)).toFixed(2)}</td><td>${i+1}</td></tr>`).join('')}</table></div>`; mixed('tj'); bar('peer',techs,techs.map((_,i)=>.62+i*.06),'Quote / Job Ratio',orange,1)}
function jobs(b){b.innerHTML=`<div class="grid cards4">${kpis([['Outstanding Jobs','186','This month'],['Flagged Items','27','Review'],['Priority Unscheduled','4','Urgent'],['Changed Items','11','Audit']])}</div><br><div class="card"><div class="panel-title"><h2>Job Report — Review Required</h2><button class="btn orange" onclick="openModal('Changes Made','Date, job number, field changed, previous value, new value and notes are captured here for external system updates.')">Changes Made</button></div><table class="table"><tr><th>Flag</th><th>Category</th><th>Account Manager</th><th>Job No.</th><th>Price</th><th>Scheduled</th><th>Technician</th><th>Status</th></tr>${Array.from({length:12},(_,i)=>`<tr><td><span class="badge ${i%4==0?'bad':'warn'}">${i%4==0?'Priority':'Review'}</span></td><td>${['SRV','MCC','QTES','PJTS','WTY','DLP'][i%6]}</td><td>${['Sarah','James','Kylie'][i%3]}</td><td>J${24000+i}</td><td>${money(900+i*620)}</td><td>${i%3?'12 Jul 2026':'Missing'}</td><td>${techs[i%techs.length]}</td><td>${i%2?'Not Complete':'Booked'}</td></tr>`).join('')}</table></div>`}
function labour(b){b.innerHTML=`<div class="grid cards4">${kpis([['Remaining Workdays','18','Month'],['Available Hours','1,152','Adjusted'],['After Hours Tech','Ben','Confirm'],['Leave Impact','64 hrs','Deducted']])}</div><br><div class="grid cards2"><div class="card"><div class="panel-title"><h2>Technician Labour Availability</h2></div><div class="chartbox"><canvas id="lab"></canvas></div></div><div class="card"><div class="panel-title"><h2>Weekly Confirmation</h2></div><div class="formgrid"><div class="field"><label>After-hours technician</label><select>${techs.map(t=>`<option>${t}</option>`).join('')}</select></div><div class="field"><label>Season</label><select><option>Winter</option><option>Summer</option></select></div><div class="field"><label>Trade school / leave notes</label><textarea>Jack at trade school Tuesday. Sophie annual leave Friday.</textarea></div><div class="field"><label>Winter sick leave allowance</label><select><option>Account for 4 sick days</option><option>No allowance</option></select></div></div></div></div>`; bar('lab',techs,techs.map((_,i)=>120-i*5),'Available Hours',steel)}
function forecast(b){b.innerHTML=`<div class="grid cards4">${kpis([['Labour Balance','232 hrs','Healthy'],['Outstanding Hours','920','Jobs'],['Available Hours','1,152','Techs'],['Target Buffer','200 hrs','Ideal']])}</div><br><div class="grid cards2"><div class="card"><div class="panel-title"><h2>Labour Forecast</h2></div><div class="chartbox"><canvas id="fore"></canvas></div></div><div class="card"><div class="panel-title"><h2>Recommended Actions</h2></div><p class="insight">Current projected balance is approximately +232 hours, which is healthy. Maintain current maintenance plan, continue quote chasing, and avoid extending hours unless approvals accelerate.</p><table class="table"><tr><td>Below +200 Apr-Sep</td><td>Pair apprentices, chase quotes</td></tr><tr><td>Approx +1000</td><td>Extend hours, defer non-urgent quotes</td></tr><tr><td>Priority work</td><td>Do not defer urgent jobs</td></tr></table></div></div>`; bar('fore',['Available','Required','Healthy Buffer'],[1152,920,200],'Hours',orange)}
function genericReport(b){b.innerHTML=`<div class="grid cards4">${kpis([['Gross Margin','37%','EGP'],['Won Quotes','68%','YTD'],['Lost Reasons','Price','Top'],['Avg Quote','$4,820','Stable']])}</div><br><div class="card"><div class="panel-title"><h2>${state.tab}</h2></div><div class="chartbox"><canvas id="gen"></canvas></div></div>`; line('gen',months,months.map((_,i)=>seed(i,40)),state.tab,orange)}
function contracts(){content.innerHTML=tabs(contractTabs)+`<div id="contractBody"></div>`; const b=contractBody; if(state.tab=='Proposal Generator')proposal(b); else if(state.tab=='Customers')customers(b); else contractDash(b)}
function contractDash(b){b.innerHTML=`<div class="grid cards4">${kpis([['Active Contracts','142','Live'],['Expiring 30 Days','9','Action'],['Revenue Under Contract','$2.4m','Annual'],['Avg Contract','$16.9k','Auto priced']])}</div><br><div class="grid cards2"><div class="card"><div class="panel-title"><h2>Upcoming Renewals</h2></div><table class="table">${sites.slice(0,7).map((s,i)=>`<tr onclick="openModal('${s}','Contract detail, assets, contacts, renewal history and proposal history opened.')"><td>${s}</td><td>${money(12000+i*2500)}</td><td><span class="badge ${i<2?'warn':'ok'}">${30+i*9} days</span></td></tr>`).join('')}</table></div><div class="card"><div class="panel-title"><h2>Contracts by Customer</h2></div><div class="chartbox"><canvas id="con"></canvas></div></div></div>`; bar('con',sites.slice(0,6),[21,18,14,13,10,9],'Contracts',steel)}
function customers(b){b.innerHTML=`<div class="card"><div class="panel-title"><h2>Customers A-Z</h2><input placeholder="Search customers..." onkeyup="filterRows(this.value)"></div><table class="table" id="custTable"><tr><th>Customer</th><th>Sites</th><th>Assets</th><th>Contract Value</th><th>Status</th></tr>${sites.sort().map((s,i)=>`<tr onclick="openModal('${s}','Sites, contacts, assets and contract details. Assets include AHUs, FCUs, splits, exhaust fans, chillers and controls.')"><td>${s}</td><td>${1+i%4}</td><td>${8+i*3}</td><td>${money(11000+i*3900)}</td><td><span class="badge ok">Active</span></td></tr>`).join('')}</table></div>`}
function proposal(b){let price=calcPrice(); b.innerHTML=`<div class="grid cards2"><div class="card"><div class="panel-title"><h2>Proposal Details</h2></div><div class="formgrid"><div class="field"><label>Upload customer details</label><input type="file" accept=".csv,.xlsx"></div><div class="field"><label>Upload asset list</label><input type="file" accept=".csv,.xlsx" onchange="fakeImportAssets()"></div><div class="field"><label>Customer</label><input value="Monash Health Clayton"></div><div class="field"><label>Visit frequency</label><select onchange="render()"><option>Quarterly</option><option>Biannual</option><option>Monthly</option></select></div><div class="field"><label>Contract length</label><select><option>12 months</option><option>24 months</option><option>36 months</option></select></div><div class="field"><label>Response time</label><select><option>Standard</option><option>Priority</option><option>Critical 24/7</option></select></div></div><br><div class="kpi"><small>Calculated Annual Contract Value</small><strong>${money(price)}</strong><span>Generated behind the scenes from pricing rules</span></div><br><button class="btn orange" onclick="generatePDF()">Generate Premium Proposal PDF</button></div><div class="card"><div class="panel-title"><h2>Hidden Pricing Rules</h2></div><p class="insight">Annual price is automatically generated from asset type, quantity, visit frequency, contract length, labour allowance, response time, inclusions, risk allowance and margin rules. The manual annual price field has been removed.</p><table class="table"><tr><td>Base labour allowance</td><td>8 hrs / visit</td></tr><tr><td>Target margin</td><td>35%</td></tr><tr><td>Priority response loading</td><td>12%</td></tr><tr><td>Complexity allowance</td><td>8%</td></tr></table></div></div><br><div class="card"><div class="panel-title"><h2>Asset Register</h2><div><button class="btn" onclick="addAsset()">Add Asset</button> <button class="btn primary" onclick="downloadAssets()">Download CSV</button></div></div><table class="table" id="assetTable">${assetRows()}</table></div>`}
function assetRows(){return `<tr><th>Type</th><th>Asset ID</th><th>Brand</th><th>Location</th><th>Frequency</th><th>Hours</th></tr>`+state.assetRows.map((r,i)=>`<tr>${r.map(c=>`<td contenteditable="true">${c}</td>`).join('')}</tr>`).join('')}
function calcPrice(){return state.assetRows.reduce((a,r)=>a+Number(r[5])*165*({'Quarterly':4,'Biannual':2,'Annual':1}[r[4]]||4),0)*1.35+3200}
function addAsset(){state.assetRows.push(['FCU','FCU-'+(10+state.assetRows.length),'Temperzone','Level 1','Quarterly',3]);render()}
function fakeImportAssets(){state.assetRows.push(['Chiller','CH-01','Carrier','Roof Plant','Quarterly',10]);render()}
function downloadAssets(){let csv='Type,Asset ID,Brand,Location,Frequency,Hours\n'+state.assetRows.map(r=>r.join(',')).join('\n'); let a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='paramount-asset-list.csv'; a.click()}
function generatePDF(){const {jsPDF}=window.jspdf; const doc=new jsPDF(); doc.setFillColor(14,42,71); doc.rect(0,0,210,45,'F'); doc.setTextColor(255,255,255); doc.setFont('times','normal'); doc.setFontSize(26); doc.text('Maintenance Proposal',18,25); doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.text('Paramount Airconditioning — Comfort Engineered',18,35); doc.setTextColor(14,42,71); doc.setFontSize(16); doc.text('Prepared for Monash Health Clayton',18,62); doc.setFontSize(11); doc.text('This premium maintenance proposal includes service methodology, inclusions, exclusions, asset schedule, compliance approach, response times, pricing and signature acceptance.',18,76,{maxWidth:170}); doc.setFontSize(14); doc.text('Calculated Annual Contract Value: '+money(calcPrice()),18,104); doc.text('Asset Schedule',18,124); let y=134; state.assetRows.forEach(r=>{doc.setFontSize(10); doc.text(r.join(' | '),18,y); y+=8}); doc.setFillColor(232,119,34); doc.rect(18,270,174,2,'F'); doc.save('Paramount-Maintenance-Proposal.pdf')}
function employee(){content.innerHTML=tabs(leaveTabs)+`<div id="leaveBody"></div>`; const b=leaveBody; if(state.tab=='Calendar')leaveCalendar(b); else if(state.tab=='Annual Leave')annualLeave(b); else if(state.tab=='Apply For Leave')applyLeave(b); else leaveDash(b)}
function leaveDash(b){b.innerHTML=`<div class="grid cards4">${kpis([['Currently Away','3','Today'],['Upcoming Leave','14','Next 30'],['Birthdays','2','This month'],['Pending Requests','5','Approval']])}</div><br><div class="grid cards2"><div class="card"><div class="panel-title"><h2>Team Leave Overview</h2></div><div class="chartbox"><canvas id="lv"></canvas></div></div><div class="card"><div class="panel-title"><h2>Upcoming Leave</h2></div><table class="table">${techs.slice(0,6).map((t,i)=>`<tr onclick="openModal('${t}','Employee leave history, annual entitlement, sick leave taken and upcoming approved leave.')"><td>${t}</td><td>${12+i} Jul</td><td><span class="badge">Annual Leave</span></td></tr>`).join('')}</table></div></div>`; bar('lv',techs,techs.map((_,i)=>12+i*2),'Leave Taken',orange)}
function leaveCalendar(b){b.innerHTML=`<div class="card"><div class="panel-title"><h2>Leave Calendar</h2><span class="badge">Annual / Sick / Long Service / Public Holiday</span></div><div class="calendar">${Array.from({length:35},(_,i)=>`<div class="day"><b>${i+1}</b>${i%6==0?'<div class="leave">Chris AL</div>':''}${i%9==0?'<div class="leave sick">Sophie Sick</div>':''}${i==24?'<div class="leave pub">Public Holiday</div>':''}${i%14==0?'<div class="leave long">Long Service</div>':''}</div>`).join('')}</div></div>`}
function annualLeave(b){b.innerHTML=`<div class="grid cards2"><div class="card"><div class="panel-title"><h2>Annual Leave Entitlement vs Taken</h2></div><div class="chartbox"><canvas id="al"></canvas></div></div><div class="card"><div class="panel-title"><h2>Leave Balances</h2></div><table class="table">${techs.map((t,i)=>`<tr onclick="openModal('${t}','Annual leave history by calendar year, entitlement, taken, booked and remaining balance.')"><td>${t}</td><td><div class="progress"><i style="width:${35+i*6}%"></i></div></td><td>${20-i} days remaining</td></tr>`).join('')}</table></div></div>`; grouped('al')}
function applyLeave(b){b.innerHTML=`<div class="card"><div class="panel-title"><h2>Apply For Leave</h2></div><div class="formgrid"><div class="field"><label>Request Type</label><select><option>Annual Leave</option><option>Sick Leave</option><option>Carer's Leave</option><option>Long Service Leave</option></select></div><div class="field"><label>Employee</label><select>${techs.map(t=>`<option>${t}</option>`).join('')}</select></div><div class="field"><label>Start Date</label><input type="date"></div><div class="field"><label>End Date</label><input type="date"></div><div class="field"><label>Half Day</label><select><option>No</option><option>Morning</option><option>Afternoon</option></select></div><div class="field"><label>Attach Document</label><input type="file"></div><div class="field" style="grid-column:1/-1"><label>Notes</label><textarea></textarea></div></div><br><button class="btn orange" onclick="openModal('Leave Submitted','Request stored in the demo portal. Future version will email the manager and update Supabase.')">Submit Request</button></div>`}
function settings(){content.innerHTML=`<div class="card"><h2>Settings</h2><p class="insight">Roles and permissions are Supabase-ready: Managers approve leave, generate maintenance proposals, edit contract data and view financials. Admin can manage users and configuration.</p></div>`}
function line(id,labels,data,label,color){new Chart(document.getElementById(id),{type:'line',data:{labels,datasets:[{label,data,borderColor:color,backgroundColor:'rgba(232,119,34,.12)',fill:true,tension:.35}]},options:{maintainAspectRatio:false,plugins:{legend:{display:true}},scales:{y:{beginAtZero:false}}}})}
function bar(id,labels,data,label,color,max){new Chart(document.getElementById(id),{type:'bar',data:{labels,datasets:[{label,data,backgroundColor:color},{label:'Company KPI / Average',data:labels.map(()=>max||70),type:'line',borderColor:navy,borderWidth:2,pointRadius:0}]},options:{maintainAspectRatio:false,plugins:{legend:{display:true}},scales:{y:{beginAtZero:true}}}})}
function stack(id){new Chart(document.getElementById(id),{type:'bar',data:{labels:months,datasets:[{label:'Approved',data:months.map((_,i)=>60+i*3),backgroundColor:steel},{label:'Outstanding',data:months.map((_,i)=>25+i*2),backgroundColor:orange}]},options:{maintainAspectRatio:false,scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}}}})}
function mixed(id){new Chart(document.getElementById(id),{data:{labels:months,datasets:[{type:'bar',label:'Jobs attended',data:months.map((_,i)=>34+i),backgroundColor:steel},{type:'bar',label:'Quotes written',data:months.map((_,i)=>28+i*.7),backgroundColor:orange},{type:'line',label:'1:1 KPI',data:months.map((_,i)=>34+i),borderColor:navy,pointRadius:0}]},options:{maintainAspectRatio:false,scales:{y:{beginAtZero:true}}}})}
function grouped(id){new Chart(document.getElementById(id),{type:'bar',data:{labels:techs,datasets:[{label:'Entitlement',data:techs.map(()=>20),backgroundColor:steel},{label:'Taken',data:techs.map((_,i)=>5+i),backgroundColor:orange}]},options:{maintainAspectRatio:false,scales:{y:{beginAtZero:true}}}})}
function openModal(t,body){modalContent.innerHTML=`<h2>${t}</h2><br><p class="insight">${body}</p>`;modal.classList.add('show')} function closeModal(){modal.classList.remove('show')}
function filterRows(q){[...document.querySelectorAll('#custTable tr')].forEach((r,i)=>{if(i)r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?'':'none'})}
render();
</script></body></html>
